<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NovaTech Smart Complaint System</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header Navigation -->
    <header class="navbar">
        <div class="nav-container">
            <div class="brand">
                <i class="fa-solid fa-graduation-cap"></i>
                <div class="brand-text">
                    <h1>NovaTech</h1>
                    <span>Complaint System</span>
                </div>
            </div>
        </div>
    </header>

    <main class="app-container">
        <!-- LOGIN VIEW -->
        <section class="view active">
            <div class="login-wrapper">
                <div class="login-card glass-panel">
                    <div class="login-header">
                        <h2>Welcome Back</h2>
                        <p>Sign in to manage your complaints.</p>
                    </div>
                    <form id="loginForm" class="login-form">
                        <div class="input-group">
                            <i class="fa-solid fa-envelope icon"></i>
                            <input type="email" id="loginEmail" placeholder="Email Address" required>
                        </div>
                        <div class="input-group">
                            <i class="fa-solid fa-lock icon"></i>
                            <input type="password" id="loginPassword" placeholder="Password" required>
                            <i class="fa-solid fa-eye-slash toggle-password" id="togglePassword"></i>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Sign In <i class="fa-solid fa-arrow-right"></i></button>
                        <div id="loginError" class="error-msg"></div>
                    </form>
                    <div class="login-footer">
                        <p>Don't have an account? <a href="register.html">Register here</a></p>
                        <p><a href="forgot-password.html">Forgot Password?</a></p>
                        <p><i class="fa-solid fa-info-circle"></i> Use university credentials.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
