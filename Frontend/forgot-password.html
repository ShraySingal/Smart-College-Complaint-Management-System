<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | NovaTech</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header Navigation -->
    <header class="navbar">
        <div class="nav-container">
            <div class="brand">
                <i class="fa-solid fa-graduation-cap"></i>
                <div class="brand-text">
                    <h1>NovaTech</h1>
                    <span>Complaint System</span>
                </div>
            </div>
        </div>
    </header>

    <main class="app-container">
        <!-- FORGOT PASSWORD VIEW -->
        <section class="view active">
            <div class="login-wrapper">
                <div class="login-card glass-panel">
                    <div class="login-header">
                        <h2>Reset Password</h2>
                        <p>Enter your email to receive a reset link.</p>
                    </div>
                    <form id="forgotPasswordForm" class="login-form">
                        <div class="input-group">
                            <i class="fa-solid fa-envelope icon"></i>
                            <input type="email" id="email" placeholder="Email Address" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Send Reset Link <i class="fa-solid fa-paper-plane"></i></button>
                    </form>
                    <div class="login-footer">
                        <p>Remembered your password? <a href="login.html">Login here</a></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
